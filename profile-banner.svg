<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0F1C"/>
      <stop offset="55%" stop-color="#0D1526"/>
      <stop offset="100%" stop-color="#111B2E"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="55%" stop-color="#22D3B8"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#1D2A44"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#dots)" opacity="0.55"/>

  <!-- ambient glow behind the graph -->
  <circle cx="905" cy="150" r="230" fill="url(#glow)"/>

  <!-- left column: terminal-style identity block -->
  <g font-family="'JetBrains Mono','Fira Code',ui-monospace,Consolas,monospace">
    <text x="60" y="96" font-size="15" fill="#5EEAD4" letter-spacing="0.5">khaled@saadaoui</text>
    <text x="205" y="96" font-size="15" fill="#5B6B8C">:~/engineering$</text>

    <text x="60" y="150" font-size="38" font-weight="700" fill="#F1F5F9" letter-spacing="0.2">Khaled Saadaoui</text>

    <text x="60" y="184" font-size="16" fill="#93A4C3">Full-Stack &amp; Mobile Engineer</text>
    <rect x="303" y="171" width="8" height="18" fill="#F59E0B">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>

    <text x="60" y="216" font-size="13" fill="#5B6B8C">React · Angular · Node.js · Flutter · Germany &amp; EU</text>
  </g>

  <!-- divider -->
  <line x1="60" y1="238" x2="640" y2="238" stroke="#1E293B" stroke-width="1"/>
  <text x="60" y="260" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="12" fill="#3F4F6E">3+ yrs shipping production web &amp; mobile platforms</text>

  <!-- right side: commit-graph signature representing web / mobile / backend -->
  <g font-family="'JetBrains Mono',ui-monospace,monospace">
    <path d="M 700 150 H 760 L 800 100 H 860 L 900 150 H 960 L 1000 190 H 1060" fill="none" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="700" cy="150" r="5" fill="#0A0F1C" stroke="#5B6B8C" stroke-width="1.5"/>

    <circle cx="800" cy="100" r="7" fill="#0D1526" stroke="#14B8A6" stroke-width="2.5"/>
    <text x="800" y="76" font-size="12" fill="#5EEAD4" text-anchor="middle" letter-spacing="1">WEB</text>

    <circle cx="900" cy="150" r="7" fill="#0D1526" stroke="#22D3B8" stroke-width="2.5"/>
    <text x="900" y="200" font-size="12" fill="#5EEAD4" text-anchor="middle" letter-spacing="1">MOBILE</text>

    <circle cx="1060" cy="190" r="7" fill="#0D1526" stroke="#F59E0B" stroke-width="2.5"/>
    <text x="1060" y="214" font-size="12" fill="#FBBF24" text-anchor="middle" letter-spacing="1">BACKEND</text>
  </g>
</svg>
